{% extends "base.html" %}

{% block title %}{{ title }} Quiz - JANOS Academy{% endblock %}

{% block extra_css %}
<style>
    .quiz-container {
        max-width: 600px;
        margin: 0 auto;
    }

    .quiz-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 30px;
        text-align: center;
    }

    .progress-bar {
        width: 100%;
        height: 8px;
        background: #e0e0e0;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 15px;
    }

    .progress-fill {
        height: 100%;
        background: #4caf50;
        width: 0%;
        transition: width 0.3s ease;
    }

    .question-card {
        background: #f8f9fa;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
        border: 2px solid #e0e0e0;
    }

    .question-card h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 1.3em;
    }

    .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .input-group input {
        flex: 1;
        padding: 12px 15px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 1em;
        transition: border-color 0.3s;
    }

    .input-group input:focus {
        outline: none;
        border-color: #667eea;
    }

    .input-group button {
        padding: 12px 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .input-group button:hover {
        transform: translateY(-2px);
    }

    .feedback {
        padding: 15px;
        border-radius: 5px;
        margin-top: 20px;
        display: none;
    }

    .feedback.correct {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .feedback.incorrect {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .score-display {
        font-size: 1.2em;
        font-weight: bold;
        color: #333;
        margin-top: 20px;
    }

    .btn-next {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        display: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="quiz-container">
    <div class="quiz-header">
        <h2>{{ title }} Class</h2>
        <p id="question-counter">Question 1 of {{ total_questions }}</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="question-card">
        <h2 id="questionPrompt"></h2>
        <div class="input-group">
            <input type="text" id="answerInput" placeholder="Enter your answer..." />
            <button onclick="submitAnswer()">Submit</button>
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="score-display" id="scoreDisplay">Current Score: 0</div>
        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">Next Question</button>
    </div>
</div>

<script>
    const classNameVal = '{{ class_name }}';
    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    const totalQuestions = {{ total_questions }};

    function loadQuestion() {
        answered = false;
        document.getElementById('answerInput').value = '';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('answerInput').disabled = false;

        fetch(`/api/question/${classNameVal}`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('questionPrompt').textContent = data.prompt;
                document.getElementById('question-counter').textContent = `Question ${data.question_number} of ${data.total_questions}`;
                const progressPercent = (data.question_number / data.total_questions) * 100;
                document.getElementById('progressFill').style.width = progressPercent + '%';
            });
    }

    function submitAnswer() {
        if (answered) return;
        answered = true;

        const answer = document.getElementById('answerInput').value;
        document.getElementById('answerInput').disabled = true;

        fetch('/api/submit-answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({class_name: classNameVal, answer: answer})
        })
        .then(r => r.json())
        .then(data => {
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            
            if (data.correct) {
                feedback.className = 'feedback correct';
                feedback.innerHTML = `✓ Correct! You earned <strong>${data.points_earned}</strong> points.`;
                score = data.current_score;
            } else {
                feedback.className = 'feedback incorrect';
                const correctAnswer = Array.isArray(data.correct_answer) ? data.correct_answer.join(', ') : data.correct_answer;
                feedback.innerHTML = `✗ Incorrect. The correct answer is: <strong>${correctAnswer}</strong><br>You lost 5 points.`;
                score = data.current_score;
            }

            document.getElementById('scoreDisplay').textContent = `Current Score: ${score}`;

            if (data.quiz_complete) {
                setTimeout(() => window.location.href = `/results/${classNameVal}`, 2000);
            } else {
                document.getElementById('nextBtn').style.display = 'block';
            }
        });
    }

    function nextQuestion() {
        currentQuestion++;
        loadQuestion();
    }

    document.getElementById('answerInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !answered) submitAnswer();
    });

    loadQuestion();
</script>
{% endblock %}
